name: CI PipeLine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Tests
        run: npm test

env:
  NODE_VERSION: "20"
  APP_NAME: cron-ticker

jobs:

  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: dist

    steps:
      - uses: actions/checkout@v4

      - name: Show Variables
        run: |
          echo "App: ${{ env.APP_NAME }}, Node: {{ env.NODE_VERSION }}"

        - name: Build
          run: npm run build
          env:
            APP_VERSION: '2.0.0'